<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>MyArubaPlan.com 🌴</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Helvetica Neue',sans-serif;background:#f5f7fa;color:#1a1a1a;padding-bottom:env(safe-area-inset-bottom,0px);padding-bottom:max(50px,calc(50px + env(safe-area-inset-bottom,0px)));min-height:100vh;width:100%;overflow-x:hidden}
::-webkit-scrollbar{display:none}
/* HEADER */
#hdr{background:linear-gradient(135deg,#0077b6,#00b4d8);padding:18px 14px 0;color:#fff}
#htop{display:flex;justify-content:center;align-items:center;margin-bottom:14px;position:relative}
#logo{font-family:Georgia,serif;font-size:22px;font-weight:900;line-height:1;color:#fff;text-align:center}
#logo span{color:#f4a900}
#wx{background:rgba(255,255,255,.15);border-radius:10px;padding:5px 9px;text-align:right;font-size:10px;color:#fff;position:absolute;right:0;top:50%;transform:translateY(-50%)}
#wx-t{font-size:15px;font-weight:900;line-height:1.1;color:#fff}
#tabs{display:flex;overflow-x:auto;gap:4px;padding-bottom:12px;scrollbar-width:none;-webkit-overflow-scrolling:touch;-webkit-overflow-scrolling:touch;justify-content:flex-start;padding-left:4px;padding-right:4px}
.tb{flex-shrink:0;padding:8px 12px;border-radius:20px;border:none;background:rgba(255,255,255,.18);color:#fff;font-weight:700;font-size:11px;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .2s}
.tab{flex-shrink:0;padding:8px 12px;border-radius:20px;border:none;background:rgba(255,255,255,.18);color:#fff;font-weight:700;font-size:11px;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .2s}
.tab.active,.tb.on{background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.tb.on{background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.2)}
/* CONTENT */
#content{padding:12px;max-width:600px;margin:0 auto;width:100%;box-sizing:border-box;overflow-y:auto;-webkit-overflow-scrolling:touch}
.panel{display:none}
.panel.on{display:block}
.pbox{border-radius:18px;padding:14px 12px}
.ptitle{font-family:Georgia,serif;font-size:17px;font-weight:700;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid rgba(0,0,0,.1)}
/* SUBTABS */
.strow{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.stb{flex:1;min-width:80px;padding:10px 0;border-radius:20px;border:2px solid #ddd;background:#fff;color:#888;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s;text-align:center}
/* CARDS */
.card{background:#fff;border-radius:14px;margin-bottom:10px;border:2px solid #f0f0f0;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:border-color .2s}
.card.open{box-shadow:0 8px 24px rgba(0,0,0,.12)}
.ch{display:flex;align-items:center;padding:13px 14px;gap:12px;cursor:pointer}
.ci{font-size:22px;width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cinfo{flex:1;min-width:0}
.cn{font-weight:700;font-size:14px;font-family:Georgia,serif;line-height:1.3}
.cbadge{font-size:11px;font-weight:700;margin-top:2px}
.csub{font-size:11px;color:#bbb;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.carrow{font-size:13px;flex-shrink:0;transition:transform .2s}
.card.open .carrow{transform:rotate(180deg)}
.cbody{padding:0 14px 14px;border-top:1px solid #f0f0f0;display:none}
.card.open .cbody{display:block}
.crow{font-size:13px;color:#555;margin-top:8px;line-height:1.6}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.chip{border-radius:12px;padding:3px 10px;font-size:11px;font-weight:600}
.tipbox{margin-top:8px;background:#fffde7;border-radius:10px;padding:9px 12px;border-left:4px solid #f9a825;font-size:13px;line-height:1.6}
.revbox{margin-top:8px;border-radius:10px;padding:9px 12px;font-size:12px;line-height:1.6;font-style:italic}
.brow{margin-top:12px;display:flex;flex-wrap:wrap;gap:7px}
.btn{padding:7px 13px;border-radius:20px;font-size:12px;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;border:none;cursor:pointer;font-family:inherit;white-space:nowrap}
/* PLANNER */
.dpick{width:100%;padding:10px 12px;border-radius:10px;border:2px solid #c5cae9;font-size:14px;color:#3949ab;font-weight:700;font-family:inherit;margin-bottom:12px}
.pitem{background:#fff;border-radius:14px;margin-bottom:10px;padding:13px;border:2px solid #e8eaf6;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.ptimebadge{background:#3949ab;color:#fff;border-radius:10px;padding:5px 8px;font-size:10px;font-weight:800;text-align:center;min-width:58px}
.tgrid{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;background:#f8f8f8;border-radius:12px;padding:10px}
.tbtn{background:#fff;border:1px solid #0077b6;color:#0077b6;padding:5px 10px;border-radius:14px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.tbtn:hover,.tbtn:active{background:#0077b6;color:#fff}
/* WORLD MAP ANIMATION */
.world-wrap{position:relative;width:100%;border-radius:16px;overflow:hidden;margin-bottom:14px;background:linear-gradient(180deg,#1a0030,#e8450a,#ffd966)}
.world-wrap canvas{display:block;width:100%;height:auto}
.world-welcome{text-align:center;padding:4px 10px 14px}
/* MAP */
.mfrow{display:flex;overflow-x:auto;gap:6px;margin-bottom:12px;padding-bottom:4px;scrollbar-width:none}
.mfbtn{flex-shrink:0;padding:6px 12px;border-radius:20px;border:1.5px solid #ddd;background:#fff;color:#555;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.mfbtn.on{background:#558b2f;border-color:#558b2f;color:#fff}
.mitem{display:flex;align-items:center;gap:12px;background:#fff;border-radius:14px;margin-bottom:8px;padding:11px 14px;box-shadow:0 2px 8px rgba(0,0,0,.06);border:1.5px solid #f0f0f0;text-decoration:none;color:inherit}
/* EMERGENCY */
.emgh{background:#c62828;color:#fff;border-radius:16px;padding:18px;text-align:center;margin-bottom:14px}
.emgcard{background:#fff;border-radius:14px;margin-bottom:10px;padding:12px 14px;display:flex;align-items:center;gap:14px;border:1.5px solid #ffcdd2}
/* TIPS */
.ptrow{display:grid;grid-template-columns:1fr 1fr 1fr;padding:9px 14px;border-top:1px solid #f8bbd0}
/* AIRBNB CARD */
.abcard{background:#fff;border-radius:14px;margin-bottom:10px;border:1.5px solid #ffccbc;box-shadow:0 2px 8px rgba(0,0,0,.06)}
/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:700;z-index:9999;display:none;max-width:90vw;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.4)}
</style>

<style>
/* ── INSTALL BANNER ── */
#install-banner{
  position:fixed;bottom:0;left:0;right:0;
  padding-bottom:max(12px,calc(12px + env(safe-area-inset-bottom,0px)));
  background:linear-gradient(135deg,#0077b6,#00b4d8);
  color:#fff;padding:12px 16px;
  display:none;align-items:center;gap:12px;
  z-index:9998;box-shadow:0 -4px 20px rgba(0,0,0,.25);
  animation:slideUp .4s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
#install-banner.show{display:flex}
#install-banner .ib-icon{font-size:28px;flex-shrink:0}
#install-banner .ib-text{flex:1;font-size:13px;line-height:1.4}
#install-banner .ib-text b{display:block;font-size:14px;margin-bottom:2px}
#install-banner .ib-install{background:#f4a900;color:#fff;border:none;border-radius:20px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0}
#install-banner .ib-close{background:rgba(255,255,255,.2);border:none;color:#fff;width:28px;height:28px;border-radius:50%;font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
/* iOS install tip */
#ios-tip{
  position:fixed;bottom:0;left:0;right:0;
  padding-bottom:max(16px,calc(16px + env(safe-area-inset-bottom,0px)));
  background:#1a1a1a;color:#fff;
  padding:16px;z-index:9998;
  display:none;flex-direction:column;gap:10px;
  box-shadow:0 -4px 20px rgba(0,0,0,.4);
  border-radius:16px 16px 0 0;
  animation:slideUp .4s ease;
}
#ios-tip.show{display:flex}
#ios-tip .it-title{font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px}
#ios-tip .it-steps{font-size:13px;color:rgba(255,255,255,.7);line-height:1.8}
#ios-tip .it-close{align-self:flex-end;background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 16px;border-radius:20px;cursor:pointer;font-family:inherit;font-size:12px}
</style>

<style>
/* ── ANDROID FIXES ── */
html{height:100%;overflow-x:hidden}
*{-webkit-box-sizing:border-box;box-sizing:border-box}
img{max-width:100%;height:auto}
.panel.on{display:block;width:100%}
.pbox{width:100%;box-sizing:border-box}
/* Fix card overflow on small screens */
.card{max-width:100%;overflow:hidden}
.cbody{overflow:hidden;word-break:break-word}
.brow{flex-wrap:wrap}
/* Fix button tap targets for Android */
.btn{min-height:36px;touch-action:manipulation}
.tb{min-height:36px;touch-action:manipulation}
/* Fix photo strip overflow */
.photo-strip{max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
/* Prevent horizontal scroll */
#hdr{width:100%;box-sizing:border-box;overflow:hidden}
#htop{width:100%;box-sizing:border-box}
</style>

  var fp = getFingerprint();

  // ── CHECK CACHE FIRST (returning user on same device) ──
  var cachedActivated = localStorage.getItem('map_activated');
  var cachedFp = localStorage.getItem('map_device');
  if(cachedActivated==='1' && cachedFp===fp){
    // Same device as before — let them in immediately
    return;
  }

  // ── SHOW LOCK SCREEN ──
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded', function(){ showLock(); });
  } else {
    showLock();
  }

  function showLock(){
    var ls=document.getElementById('lock-screen');
    if(!ls) return;
    ls.classList.remove('hidden');
  }

  // ── ACTIVATE (calls Firebase) ──
  window.activateLock = function(){
    var input = document.getElementById('lock-input');
    var err = document.getElementById('lock-err');
    var btn = document.querySelector('.lock-btn');
    var code = input.value.trim().toUpperCase();

    if(!code){ err.textContent='Please enter your activation code.'; return; }
    if(!VALID_CODES.includes(code)){
      err.textContent='Invalid code. Check your email and try again.';
      input.style.borderColor='#ff6b6b';
      return;
    }

    // Show loading
    btn.textContent='⏳ Checking...';
    btn.disabled = true;
    err.textContent = '';

    var codeKey = code.replace(/-/g,'_'); // Firebase key can't have dashes
    var url = FB_URL + '/codes/' + codeKey + '.json';

    // ── READ from Firebase ──
    fetch(url)
      .then(function(r){ return r.json(); })
      .then(function(data){
        if(!data){
          // Code never used — register it now (first device wins)
          return fetch(url, {
            method: 'PUT',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ fp: fp, usedAt: Date.now(), code: code })
          }).then(function(r){ return r.json(); })
            .then(function(){
              // Success — activate locally
              localStorage.setItem('map_activated','1');
              localStorage.setItem('map_device', fp);
              document.getElementById('lock-screen').classList.add('hidden');
              btn.textContent='🌴 Activate';
              btn.disabled=false;
            });
        } else if(data.fp === fp){
          // Same device — welcome back
          localStorage.setItem('map_activated','1');
          localStorage.setItem('map_device', fp);
          document.getElementById('lock-screen').classList.add('hidden');
          btn.textContent='🌴 Activate';
          btn.disabled=false;
        } else {
          // Code already used on ANOTHER device — block
          err.textContent='⛔ This code is already activated on another device. Each purchase is valid for 1 device only.';
          input.style.borderColor='#ff6b6b';
          btn.textContent='🌴 Activate';
          btn.disabled=false;
        }
      })
      .catch(function(){
        // Firebase unreachable — fall back to localStorage check
        var usedCodes = JSON.parse(localStorage.getItem('map_used_codes')||'{}');
        if(usedCodes[code] && usedCodes[code] !== fp){
          err.textContent='⛔ This code is already in use on another device.';
          input.style.borderColor='#ff6b6b';
        } else {
          // Allow (offline fallback)
          usedCodes[code] = fp;
          localStorage.setItem('map_used_codes', JSON.stringify(usedCodes));
          localStorage.setItem('map_activated','1');
          localStorage.setItem('map_device', fp);
          document.getElementById('lock-screen').classList.add('hidden');
        }
        btn.textContent='🌴 Activate';
        btn.disabled=false;
      });
  };

  // Format input as ARUBA-XXXX
  setTimeout(function(){
    var inp = document.getElementById('lock-input');
    if(!inp) return;
    inp.addEventListener('input', function(){
      var v = this.value.replace(/[^A-Za-z0-9]/g,'').toUpperCase();
      if(v.length <= 5) this.value = v;
      else this.value = v.slice(0,5) + '-' + v.slice(5,9);
    });
    inp.addEventListener('keydown', function(e){
      if(e.key==='Enter') window.activateLock();
    });
  }, 500);

})();

function savePlanner(){
  try{localStorage.setItem('map_planner',JSON.stringify(planner));}catch{}
  updateAppBadge();
}

function updateAppBadge(){
  var total=Object.values(planner).reduce(function(s,arr){return s+(arr?arr.length:0);},0);
  // Web App Badging API — works on Android PWA + Chrome desktop
  if('setAppBadge' in navigator){
    if(total>0){
      navigator.setAppBadge(total).catch(function(){});
    } else {
      navigator.clearAppBadge().catch(function(){});
    }
  }
}

function callTaxi(ph){
  var clean=ph.replace(/[^+0-9]/g,'');
  // Try multiple methods for maximum mobile compatibility
  try{ window.location.href='tel:'+clean; } catch(e){}
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',3000);
}
function L(href,label,bg,color){
  if(!href)return '';
  return `<a href="${href}" target="_blank" class="btn" style="background:${bg};color:${color}">${label}</a>`;
}
function chips(text,bg,ac){
  if(!text)return '';
  return `<div class="chips">${text.split(' · ').map(c=>`<span class="chip" style="background:${bg};color:${ac}">${c}</span>`).join('')}</div>`;
}
function formatDate(d){
  return new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
}

function card(item,ac,lt,extra=''){
  const id=item.id||item.n;
  const isOpen=openCard===id;
  let body='';
  if(isOpen){
    body='<div class="cbody">';
    if(item.cuisine)body+=`<div class="crow">🍴 <b>Cuisine:</b> ${item.cuisine}</div>`;
    if(item.avg)body+=`<div class="crow">💰 <b>Price:</b> ${item.avg} <span style="color:#ccc">(${item.pr})</span></div>`;
    if(item.price&&!item.avg)body+=`<div class="crow">💰 <b>Price:</b> ${item.price}</div>`;
    if(item.photos){
      const pics=hotelPhotos[item.id]||[];
      body+=`<div style="margin-top:12px">
        <div style="font-size:11px;font-weight:700;color:#3949ab;letter-spacing:.5px;margin-bottom:8px">📸 PHOTOS</div>
        <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;-webkit-overflow-scrolling:touch">
          ${pics.map((url,i)=>`<img src="${url}" alt="Hotel photo ${i+1}" style="width:160px;height:110px;object-fit:cover;border-radius:10px;flex-shrink:0;cursor:pointer" onclick="event.stopPropagation();window.open('${url}','_blank')" onerror="this.style.display='none'">`).join('')}
        </div>
        <a href="${item.photos.gallery}" target="_blank" onclick="event.stopPropagation()" style="display:inline-block;margin-top:8px;font-size:12px;color:#3949ab;font-weight:700;text-decoration:none">🖼️ See all photos on official website →</a>
      </div>`;
    }
    if(item.bt)body+=`<div class="crow">⏰ <b>Best Time:</b> ${item.bt}</div>`;
    if(item.hrs)body+=`<div class="crow">⏰ <b>Hours:</b> ${item.hrs}</div>`;
    if(item.loc)body+=`<div class="crow">📍 <b>Location:</b> ${item.loc}</div>`;
    if(item.ph)body+=`<div class="crow">📞 <b>Phone:</b> ${item.ph}</div>`;
    if(item.type)body+=`<div class="crow">🏷️ <b>Type:</b> ${item.type}</div>`;
    if(item.chips)body+=chips(item.chips,lt,ac);
    if(item.delivery)body+=`<div style="margin-top:8px;background:#e8f5e9;border-radius:10px;padding:8px 12px;font-size:12px;color:#1b5e20;font-weight:700">🚚 Online ordering & delivery available!</div>`;
    if(item.tip)body+=`<div class="tipbox">💡 <b>Tip:</b> ${item.tip}</div>`;
    if(item.rev)body+=`<div class="revbox" style="background:${lt};border-left:3px solid ${ac}">${item.rev}</div>`;
    body+=`<div class="brow">`;
    if(item.web)body+=L(item.web,'🌐 Website',ac,'#fff');
    if(item.fb)body+=L(item.fb,'📘 Facebook','#1877F2','#fff');
    if(item.ph)body+=`<a href="tel:${item.ph}" class="btn" style="background:${lt};color:${ac}">📞 ${item.ph}</a>`;
    if(item.book)body+=L(item.book,'🌐 Book Now',lt,ac);
    if(item.map)body+=L(item.map,'📍 Maps','#f5f5f5','#666');
    if(item.photos)body+=`<a href="${item.photos.gallery}" target="_blank" onclick="event.stopPropagation()" class="btn" style="background:#e8eaf6;color:#3949ab">📸 Gallery</a>`;
    if(extra)body+=extra;
    body+='</div>';
    if(pickerFor===id){
      body+=`<div style="margin-top:10px;background:#f8f8f8;border-radius:12px;padding:10px">
        <div style="font-size:12px;font-weight:700;color:#333;margin-bottom:8px">Pick a time for ${plannerDate}:</div>
        <div class="tgrid">${(item.times||TIMES).map(tm=>`<button class="tbtn" onclick="addPlan('${id}','${tm}');event.stopPropagation()">${tm}</button>`).join('')}</div>
      </div>`;
    }
    body+='</div>';
  }
  return `<div class="card${isOpen?' open':''}" style="${isOpen?'border-color:'+ac+';':''}" onclick="toggleCard('${id}')">
    <div class="ch">
      <div class="ci" style="background:${lt}">${item.e}</div>
      <div class="cinfo">
        <div class="cn">${item.n}</div>
        <div class="cbadge" style="color:${ac}">${item.badge||''}</div>
        <div class="csub">📍 ${(item.loc||'').split('(')[0].trim()}</div>
        ${item.ph?`<div style="font-size:11px;color:#2e7d32;font-weight:600;margin-top:2px">📞 ${item.ph}</div>`:''}
      </div>
      <div class="carrow" style="color:${ac}">▼</div>
    </div>${body}</div>`;
}

function toggleCard(id){
  if(openCard===id){openCard=null;pickerFor=null;}
  else{openCard=id;pickerFor=null;}
  render();
}

function showPicker(id,ev){
  if(ev)ev.stopPropagation();
  pickerFor=pickerFor===id?null:id;
  if(openCard!==id)openCard=id;
  render();
}

function addBtn(item){
  return `<button class="btn" style="background:#0077b6;color:#fff" onclick="showPicker('${item.id||item.n}',event)">📅 Add to Planner</button>`;
}

function addPlan(id,time){
  const all=[...beaches,...restaurants,...foodTrucks,...snacks,...parks,...hotels,...waterSports,...tours,...airbnbs.map(a=>({...a,id:a.n.replace(/'/g,''),loc:a.area||'',map:a.map||'',tip:a.note||'',bt:''}))];
  const item=all.find(x=>(x.id||x.n)===id);
  if(!item)return;
  if(!planner[plannerDate])planner[plannerDate]=[];
  if(planner[plannerDate].find(x=>x.id===id&&x.time===time)){toast('Already added at this time!');return;}
  planner[plannerDate].push({id,n:item.n,e:item.e,time,loc:item.loc||'',map:item.map||'',tip:item.tip||'',bt:item.bt||''});
  planner[plannerDate].sort((a,b)=>TIMES.indexOf(a.time)-TIMES.indexOf(b.time));
  savePlanner();
  pickerFor=null;TAB=0;
  toast(`✅ Added "${item.n}" at ${time}`);
  render();
}

function removePlan(id,time,ev){
  if(ev)ev.stopPropagation();
  if(planner[plannerDate])
    planner[plannerDate]=planner[plannerDate].filter(x=>!(x.id===id&&x.time===time));
  savePlanner();render();
}

function shareWA(){
  const items=planner[plannerDate]||[];
  if(!items.length){toast('⚠️ Add activities first!');return;}
  let txt=`🌴 *MyArubaPlan.com*\n📅 *${formatDate(plannerDate)}*\n\n`;
  items.forEach(a=>{txt+=`⏰ *${a.time}* — ${a.e} ${a.n}\n📍 ${a.loc}\n${a.map}\n\n`;});
  txt+='Planned with MyArubaPlan.com 🌴';
  window.open('https://wa.me/?text='+encodeURIComponent(txt),'_blank');
}

const HOTEL_ZONE_IDS=new Set(["low-rise","eagle-beach","high-rise-south","high-rise-north"]);

  document.getElementById('t-pass-val').textContent=taxiPassengers;
}

function calcTaxiFare(){
  var fromKey=document.getElementById('t-from').value;
  var toKey=document.getElementById('t-to').value;
  var dateVal=document.getElementById('t-date').value;
  var timeVal=document.getElementById('t-time').value;
  var useTrunk=document.getElementById('t-trunk').checked;
  var res=document.getElementById('t-result');

  if(!fromKey||!toKey){res.innerHTML='<div style="color:#c0a060;font-size:13px;text-align:center;padding:12px">Please select pickup and destination.</div>';return;}
  if(fromKey===toKey){res.innerHTML='<div style="color:#c0a060;font-size:13px;text-align:center;padding:12px">Pickup and destination cannot be the same.</div>';return;}

  // Look up fare: TAXI_FARE_MATRIX[toKey][1][fromKey]
  var destData=TAXI_FARE_MATRIX[toKey];
  if(!destData){res.innerHTML='<div style="color:#c0a060;font-size:13px;text-align:center;padding:12px">Destination not in fare list. See taxi.aw</div>';return;}
  var base=destData[1][fromKey];
  // Try reverse lookup if direct not found
  if(base===undefined||base===null){
    var fromData=TAXI_FARE_MATRIX[fromKey];
    if(fromData) base=fromData[1][toKey];
  }
  if(base===undefined||base===null){res.innerHTML='<div style="color:#c0a060;font-size:13px;text-align:center;padding:12px">Route not found. See official rates at <a href="https://taxi.aw" target="_blank" style="color:#f57f17;font-weight:700">taxi.aw</a></div>';return;}

  // Official surcharge: $5 (night 11PM-7AM, Sunday, official holidays, Dec24-Jan1)
  var surcharge=0;
  var surchargeReason='';
  if(timeVal){
    var h2=parseInt(timeVal.split(':')[0]);
    if(h2>=23||h2<7){surcharge=5;surchargeReason='Night (11PM–7AM)';}
  }
  if(dateVal&&surcharge===0){
    var d2=new Date(dateVal+'T12:00:00');
    if(d2.getDay()===0){surcharge=5;surchargeReason='Sunday';}
  }
  if(dateVal&&surcharge===0){
    var holidays=['2026-01-01','2026-01-25','2026-02-16','2026-03-18','2026-04-03','2026-04-06','2026-04-27','2026-05-01','2026-05-14','2026-12-25','2026-12-26'];

    rows+

      '<div><div style="font-size:11px;color:#8a7a5a">TOTAL (1–'+passengers+' passenger'+(passengers>1?'s':'')+')</div><div style="font-size:11px;color:#aaa;margin-top:2px">Afl. '+totalAfl+'</div></div>'+
      '<span style="font-weight:900;font-size:36px;color:#2c2418">$'+total+'</span>'+
    '</div>'+
    '<div style="background:#ede8dc;border-radius:10px;padding:10px;font-size:12px;color:#7a6a4a">'+
      '<div style="margin-bottom:4px">Suggested tip: $'+tip10+' (10%) — $'+tip15+' (15%)</div>'+

function getLocName(k){ var m=LOC_NAMES; return m[k]||k; }
function sendTaxiBooking(){
  var bFromTxt=document.getElementById('b-from-text');
  var fk='__text__';
  var fkText=bFromTxt?bFromTxt.value.trim():'';
  var bToTxt=document.getElementById('b-to-text');
  var tk='__text__';
  var tkText=bToTxt?bToTxt.value.trim():'';
  var dt=document.getElementById('b-date').value;
  var tm=document.getElementById('b-time').value;
  var nm=(document.getElementById('b-name')||{}).value||'';
  var nt=(document.getElementById('b-notes')||{}).value||'';
  var rad=document.querySelector('input[name="b-taxi"]:checked');
  if(!fk||(fk==='__text__'&&!fkText)){alert('Enter a pickup location.');return;}
  if(!tk||(tk==='__text__'&&!tkText)){alert('Enter a destination.');return;}
  if(fk!=='__text__'&&tk!=='__text__'&&fk===tk){alert('Pickup and destination cannot be the same.');return;}
  if(!rad){alert('Select a taxi driver.');return;}
  var fn=(fk==='__text__')?fkText:getLocName(fk), tn=(tk==='__text__')?tkText:getLocName(tk);
  var ds=dt;
  if(dt){var d=new Date(dt+'T12:00:00');ds=d.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});}
  var ts=tm;
  if(tm){var p=tm.split(':');var h=parseInt(p[0]);ts=(h>12?h-12:h||12)+':'+p[1]+(h>=12?' PM':' AM');}
  var msg='*TAXI BOOKING REQUEST*\n\n*Pickup:* '+fn+'\n*Drop-off:* '+tn+'\n*Passengers:* '+bookPass+'\n*Date:* '+ds+'\n*Time:* '+ts+(nm?'\n*Name:* '+nm.trim():'')+(nt?'\n*Notes:* '+nt.trim():'')+'\n\n_Sent from MyArubaPlan.com_\n_Please confirm availability. Thank you!_';
  window.open('https://wa.me/'+rad.value+'?text='+encodeURIComponent(msg),'_blank');

  // ── AUTO-ADD TO PLANNER ──
  if(dt && tm){
    // Format time like "9:30 AM" for planner
    var tParts=tm.split(':');
    var tH=parseInt(tParts[0]);
    var tM=tParts[1]||'00';
    var tAmPm=tH>=12?' PM':' AM';
    var tH12=tH>12?tH-12:(tH===0?12:tH);
    var planTime=tH12+':'+tM+tAmPm;

    // Build planner entry
    var taxiEntry={
      id:'taxi_'+Date.now(),
      n:'🚕 Taxi: '+fn+' → '+tn,
      e:'🚕',
      time:planTime,
      loc:fn+' → '+tn,
      map:'',
      tip:(rad?'Booked with '+rad.getAttribute('data-name')+' ('+rad.getAttribute('data-ph')+')':'') + (nt?' · Notes: '+nt.trim():''),
      bt:''
    };

    if(!planner[dt]) planner[dt]=[];

    // Avoid duplicates
    var dup=planner[dt].find(function(x){return x.id===taxiEntry.id;});
    if(!dup){
      planner[dt].push(taxiEntry);
      planner[dt].sort(function(a,b){
        var times=["12:00 AM","1:00 AM","2:00 AM","3:00 AM","4:00 AM","5:00 AM","6:00 AM","7:00 AM","8:00 AM","9:00 AM","9:30 AM","10:00 AM","10:30 AM","11:00 AM","11:30 AM","12:00 PM","12:30 PM","1:00 PM","1:30 PM","2:00 PM","2:30 PM","3:00 PM","3:30 PM","4:00 PM","4:30 PM","5:00 PM","5:30 PM","6:00 PM","6:30 PM","7:00 PM","7:30 PM","8:00 PM","8:30 PM","9:00 PM","9:30 PM","10:00 PM","10:30 PM","11:00 PM"];
        var ai=times.indexOf(a.time); var bi=times.indexOf(b.time);
        return (ai<0?99:ai)-(bi<0?99:bi);
      });
      savePlanner();
      plannerDate=dt;
      toast('✅ Taxi booked & added to Planner for '+ds+'!');
    }
  } else {
    toast('💬 WhatsApp booking sent!');
  }
}

// ═══════ TAXI BOOKING TOGGLE ═══════
function toggleBookInput(field){
  var sel = document.getElementById('b-'+field);
  var txt = document.getElementById('b-'+field+'-text');
  var btnDrop = document.getElementById('b-'+field+'-toggle-drop');
  var btnText = document.getElementById('b-'+field+'-toggle-text');
  if(!sel||!txt) return;
  var isText = txt.style.display !== 'none';
  if(isText){
    // Switch to dropdown
    txt.style.display='none'; sel.style.display='';
    btnDrop.style.background='#25D366'; btnDrop.style.color='#fff';
    btnText.style.background='#e8f5e9'; btnText.style.color='#2e7d32';
  } else {
    // Switch to text
    sel.style.display='none'; txt.style.display='';
    btnText.style.background='#25D366'; btnText.style.color='#fff';
    btnDrop.style.background='#e8f5e9'; btnDrop.style.color='#2e7d32';
  }
}
function toggleBookOutput(field){toggleBookInput(field);}

      h+='<span style="font-size:20px">'+c.e+'</span>';
      h+='<span style="font-weight:700;font-size:13px;color:#e65100">'+c.n+'</span>';
      h+='</div>';
      h+='<div style="padding:10px 14px">';
      c.items.forEach(function(item){
        h+='<div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #fffde7;font-size:12px;color:#555;line-height:1.6">';
        h+='<span style="color:#f57f17;flex-shrink:0;margin-top:2px">›</span>';
        h+='<span>'+item+'</span>';
        h+='</div>';
      });
      h+='</div></div>';
    });

    h+='<div style="text-align:center;padding:12px;font-size:11px;color:#bbb">© 2026 taxi.aw — Departamento Transporte Publico (DTP) Aruba</div>';
  }

  return h;
}



// ═══════ RENDER ═══════
var activeTab=0;

function render(){
  var t=TABS_CFG[activeTab];
  document.body.style.background=t.bg;
  var tabs='';
  // Count total planner items across all dates
  var totalPlanItems=Object.values(planner).reduce(function(s,arr){return s+(arr?arr.length:0);},0);
  TABS_CFG.forEach(function(tc,i){
    var badge='';
    if(i===0 && totalPlanItems>0){
      badge='<span style="display:inline-flex;align-items:center;justify-content:center;background:#e53935;color:#fff;font-size:9px;font-weight:900;border-radius:50%;width:16px;height:16px;margin-left:4px;vertical-align:middle;line-height:1;flex-shrink:0">'+(totalPlanItems>99?'99+':totalPlanItems)+'</span>';
    }
    tabs+='<button class="tb'+(i===activeTab?' on':'')+'" onclick="activeTab='+i+';render()" style="'+(i===activeTab?'background:#fff;color:'+tc.ac+';':'background:rgba(255,255,255,.18);color:#fff;')+'">'+tc.label+badge+'</button>';
  });
  document.getElementById('tabs').innerHTML=tabs;
  var headings=['📅 My Daily Itinerary','🚕 Taxi Contacts','🏨 Hotels & Airbnbs','🍽️ Food Guide','🏖️ Top 5 Beaches','🚗 Rentals & Tours','🌴 Parks & Attractions','🏄 Water Sports','🛒 Top 5 Supermarkets','💬 Tips & Papiamento','🚨 Emergency Contacts'];
  document.getElementById('heading').textContent=headings[activeTab]||'';
  var body='';
  switch(activeTab){
    case 0:body=renderPlanner(t.ac,t.lt);
      // Clear badge when user opens planner
      if('clearAppBadge' in navigator) navigator.clearAppBadge().catch(function(){});
      break;
    case 1:body=renderTaxi();break;
    case 2:body=renderHotels(t.ac,t.lt);break;
    case 3:body=renderFood(t.ac,t.lt);break;
    case 4:body=beaches.map(function(b){return card(b,t.ac,t.lt,addBtn(b));}).join('');break;
    case 5:body=renderRentals(t.ac,t.lt);break;
    case 6:body=parks.map(function(p){return card(p,t.ac,t.lt,addBtn(p));}).join('');break;
    case 7:body=waterSports.map(function(w){return card(w,t.ac,t.lt,addBtn(w));}).join('');break;
    case 8:body=renderSupermarkets(t.ac,t.lt);break;
    case 9:body=renderTips(t.ac,t.lt);break;
    case 10:body=renderEmergency();break;
  }
  document.getElementById('content').innerHTML=body;
  document.getElementById('content').scrollTop=0;

  // ── EVENT DELEGATION: tel: calls (works on both mobile & desktop) ──
  var content=document.getElementById('content');
  function handleTelTap(e){
    var el=e.target;
    // Walk up to find data-tel
    while(el && el!==content){
      if(el.dataset && el.dataset.tel){
        e.preventDefault();
        e.stopPropagation();
        window.location.href='tel:'+el.dataset.tel;
        return;
      }
      el=el.parentElement;
    }
  }
  content.addEventListener('touchend', handleTelTap, {passive:false});
  content.addEventListener('click', handleTelTap, false);
}

// ═══════ WEATHER ═══════
function fetchWeather(){
  fetch('https://api.open-meteo.com/v1/forecast?latitude=12.5092&longitude=-70.0086&current=temperature_2m,weathercode,windspeed_10m,relativehumidity_2m&temperature_unit=fahrenheit&windspeed_unit=mph&timezone=America%2FCaracas')
    .then(function(r){return r.json();})
    .then(function(data){
      var c=data.current;
      var code=c.weathercode;
      var wmo={0:'☀️ Clear',1:'🌤️ Mostly Clear',2:'⛅ Partly Cloudy',3:'☁️ Overcast',45:'🌫️ Foggy',48:'🌫️ Foggy',51:'🌦️ Drizzle',53:'🌦️ Drizzle',55:'🌧️ Drizzle',61:'🌧️ Rain',63:'🌧️ Rain',65:'🌧️ Heavy Rain',71:'❄️ Snow',73:'❄️ Snow',75:'❄️ Snow',80:'🌦️ Showers',81:'🌦️ Showers',82:'⛈️ Heavy Showers',95:'⛈️ Thunderstorm',96:'⛈️ Thunderstorm',99:'⛈️ Thunderstorm'};
      var desc=wmo[code]||'🌤️ Clear';
      var wi=document.getElementById('wxi');
      var wt=document.getElementById('wx-t');
      var wd=document.getElementById('wxd');
      if(wi) wi.textContent=desc.split(' ')[0];
      if(wt) wt.textContent=Math.round(c.temperature_2m)+'°F';
      if(wd) wd.textContent=desc.split(' ').slice(1).join(' ');
    })
    .catch(function(){
      var wt=document.getElementById('wx-t');
      if(wt) wt.textContent='--°F';
    });
}

      document.getElementById('ios-close-btn').onclick=function(){

        setTimeout(function(){if(iosTip.parentNode)iosTip.remove();},400);
      };
      setTimeout(function(){
        if(iosTip.parentNode){
          iosTip.classList.remove('show');
          setTimeout(function(){if(iosTip.parentNode)iosTip.remove();},400);
        }
      },10000);
    }
  },3000);
});
